<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>JWT Generator</title>
    <link rel="icon" href="static/favicon.png">
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/css/font.css">
    <link rel="stylesheet" href="static/css/custom.css">
    <script src="static/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">JWT Generator</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="" id="home">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="/docs"
                            target="_blank">Swagger</a></li>
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="/redoc"
                            target="_blank">ReDoc</a></li>
                    <li class="nav-item"><a class="nav-link active" href="https://github.com/joguenco/Radmin.git"
                            target="_blank">GitHub</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- Page content-->
    <div class="container">
        <div class="mt-5 mb-5">
            <h1>Data for your JSON Web Token</h1>
        </div>
        <div>
            <div class="col-6">
                <div class="mb-3">
                    <label for="identifier" class="form-label">Identifier</label>
                    <input id="identifier" type="text" class="form-control" name="identifier"
                        placeholder="Unique Identifier or VAT" required>
                </div>
                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input id="name" type="text" class="form-control" name="name" placeholder="Friendly Name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input id="email" type="email" class="form-control" name="email" placeholder="name@resolvedor.dev"
                        required>
                </div>
                <div class="mb-3">
                    <label for="role" class="form-label">Role</label>
                    <input id="role" type="text" class="form-control" name="role" placeholder="Role Name (Super)"
                        required>
                </div>
                <div class="mb-3">
                    <label for="expiration_date" class="form-label">Expiration Date</label>
                    <input id="expiration_date" type="text" class="form-control" name="expiration_date"
                        placeholder="YYYY-MM-DD HH:MM" required>
                </div>
                <div class="mb-3">
                    <label for="audience" class="form-label">Audience</label>
                    <input id="audience" type="text" class="form-control" name="audience"
                        placeholder="Audience (https://resolvedor.dev)" required>
                </div>
                <div class="mb-3">
                    <label for="issuer" class="form-label">Issuer</label>
                    <input id="issuer" type="text" class="form-control" name="issuer"
                        placeholder="Service Name (My Own Service)" required>
                </div>
                <div class="mb-3">
                    <label for="private_key" class="form-label">Private Key</label>
                    <input id="private_key" type="text" class="form-control" name="private_key"
                        placeholder="Private Key (123456789XXX)" required>
                </div>
                <button id="generate" type="submit" class="btn btn-primary">Generate</button>
                <button id="ping" type="submit" class="btn btn-info">Ping</button>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="modalDialog" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">...</h5>
                </div>
                <div id="modalMessage" class="modal-body">
                    ...
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" id="copyBtn">Copy</button>
                    <button type="button" class="btn btn-secondary" id="closeModal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="static/js/main.js"></script>
</body>

</html>
