<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>JWT Generator</title>
    <link rel="icon" href="static/favicon.png">
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/css/font.css">
    <script src="static/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">JWT Generator</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="/docs" target="_blank">Swagger</a></li>
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="/redoc" target="_blank">ReDoc</a></li>
                    <li class="nav-item"><a class="nav-link active" href="https://github.com/joguenco/Radmin.git" target="_blank">GitHub</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- Page content-->
    <div class="container">
        <div class="mt-5">
            <h1>Data for your JSON Web Token</h1>            
        </div>
        <div>
            <form class="row">
                <div class="col-6">
                    <div class="mb-3">
                        <label for="identifier" class="form-label">Identifier</label>
                        <input type="text" class="form-control" id="identifier" name="identifier" placeholder="Unique Identifier or VAT" required>
                    </div>
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Friendly Name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="role" class="form-label">Role</label>
                        <input type="text" class="form-control" id="role" name="role" placeholder="Role Name" required>
                    </div>
                    <div class="mb-3">
                        <label for="expiration_date" class="form-label">Expiration Date</label>
                        <input type="text" class="form-control" id="expiration_date" name="expiration_date" placeholder="YYYY-MM-DD" required>
                    </div>
                    <div class="mb-3">
                        <label for="issuer" class="form-label">Issuer</label>
                        <input type="text" class="form-control" id="issuer" name="issuer" placeholder="Issuer Name" required>
                    </div>
                    <div class="mb-3">
                        <label for="service" class="form-label">Service</label>
                        <input type="text" class="form-control" id="service" name="service" placeholder="Service Name" required>
                    </div>
                    <div class="mb-3">
                        <label for="private_key" class="form-label">Private Key</label>
                        <input type="text" class="form-control" id="private_key" name="private_key" placeholder="Private Key" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Generate</button>
                </div>

            </form>
        </div>
    </div>
</body>

</html>
