<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>JWT Generator</title>
    <link rel="icon" href="static/favicon.png">
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/css/font.css">
    <script src="static/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">JWT Generator</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="https://github.com/joguenco/Radmin.git" target="_blank">GitHub</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- Page content-->
    <div class="container">
        <div class="mt-5">
            <h1>Data</h1>            
        </div>
        <div>
            <form class="row">
                <div class="col-6">
                    <div class="mb-3">
                        <label for="secret" class="form-label">Secret</label>
                        <input type="text" class="form-control" id="secret" name="secret" required>
                    </div>
                    <div class="mb-3">
                        <label for="payload" class="form-label">Payload</label>
                        <textarea class="form-control" id="payload" name="payload" rows="10" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Generate</button>
                </div>

            </form>
        </div>
    </div>
</body>

</html>
